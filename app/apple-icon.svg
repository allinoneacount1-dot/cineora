<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="cineora-apple-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="55%" stop-color="#F6F8FF"/>
      <stop offset="100%" stop-color="#00F5FF"/>
    </linearGradient>
    <radialGradient id="cineora-apple-aura" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#00F5FF" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#9B4DFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0A0F2C" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Solid Aurora Deep background -->
  <rect width="180" height="180" fill="#0A0F2C"/>
  <!-- Subtle aurora glow behind mark -->
  <circle cx="90" cy="90" r="80" fill="url(#cineora-apple-aura)"/>
  <!-- Outer ring -->
  <circle cx="90" cy="90" r="64" fill="none" stroke="rgba(246,248,255,0.18)" stroke-width="2"/>
  <!-- Inner ring (subtle) -->
  <circle cx="90" cy="90" r="50" fill="none" stroke="rgba(246,248,255,0.08)" stroke-width="1"/>
  <!-- C-shape with aurora gradient -->
  <path
    d="M 130 56 A 48 48 0 1 0 130 124"
    fill="none"
    stroke="url(#cineora-apple-grad)"
    stroke-width="6"
    stroke-linecap="round"
  />
  <!-- Center pulse (gold) -->
  <circle cx="90" cy="90" r="4.5" fill="#FFD700"/>
  <circle cx="90" cy="90" r="9" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
  <!-- Tick marks around outer ring (24 ticks) -->
  <g stroke="#F6F8FF" stroke-opacity="0.18" stroke-width="1">
    <line x1="90" y1="22" x2="90" y2="30"/>
    <line x1="90" y1="150" x2="90" y2="158"/>
    <line x1="22" y1="90" x2="30" y2="90"/>
    <line x1="150" y1="90" x2="158" y2="90"/>
  </g>
</svg>